# ===============================================================
# CONFIGURA«’ES DO JPA / HIBERNATE
# ===============================================================
# O 'update' cria ou atualiza as tabelas automaticamente com base nas classes Java
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================================================
# CONFIGURA«’ES DO THYMELEAF (INTERF¡CIA GR¡FICA)
# ===============================================================
# Desativa o cache para que as mudanÁas no HTML apareÁam sem precisar reiniciar o sistema
spring.thymeleaf.cache=false